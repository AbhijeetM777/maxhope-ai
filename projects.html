<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Projects - Maxhope.AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard-layout">
  <div id="sidebar-container"></div>
  <main class="dash-main">
    <div id="topbar-container"></div>
    <div class="dash-content">

      <div class="welcome-banner" style="margin-bottom:28px;">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
          <div>
            <h2>&#128193; My Projects</h2>
            <p>All your deployed tools, websites, chatbots, and campaigns.</p>
          </div>
          <div id="project-count-badge" style="font-size:14px;color:var(--muted);"></div>
        </div>
      </div>

      <!-- Filter Tabs -->
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;" id="filter-tabs">
        <button class="btn btn-sm filter-tab active" onclick="filterProjects('all', this)">All</button>
        <button class="btn btn-sm filter-tab" onclick="filterProjects('automation', this)">&#9889; Automations</button>
        <button class="btn btn-sm filter-tab" onclick="filterProjects('website', this)">&#127760; Websites</button>
        <button class="btn btn-sm filter-tab" onclick="filterProjects('chatbot', this)">&#129302; Chatbots</button>
        <button class="btn btn-sm filter-tab" onclick="filterProjects('microsaas', this)">&#128200; SaaS</button>
        <button class="btn btn-sm filter-tab" onclick="filterProjects('email', this)">&#128231; Campaigns</button>
        <button class="btn btn-sm filter-tab" onclick="filterProjects('cloud', this)">&#9729;&#65039; Cloud</button>
        <button class="btn btn-sm filter-tab" onclick="filterProjects('content', this)">&#9997;&#65039; Content</button>
      </div>

      <!-- Projects Grid -->
      <div id="projects-grid" class="grid-3" style="gap:16px;"></div>

      <!-- Empty State -->
      <div id="empty-state" class="hidden" style="text-align:center;padding:60px 20px;">
        <div style="font-size:48px;margin-bottom:16px;">&#128193;</div>
        <h3 style="margin-bottom:8px;">No projects yet</h3>
        <p style="color:var(--muted);margin-bottom:24px;">Deploy your first project from any AI tool to see it here.</p>
        <a href="dashboard.html" class="btn btn-primary">Go to Dashboard</a>
      </div>

    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script src="js/subscription.js"></script>
<script src="js/projects.js"></script>
</body>
</html>
