<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Maxhope.AI</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html" class="nav-logo" style="font-size:24px;">Maxhope.<span>AI</span></a>
    </div>
    <h2>Create your account</h2>
    <p class="auth-subtitle">Start your 7-day free trial. No credit card required.</p>

    <button class="social-btn" onclick="window.location.href='login.html'" style="gap:12px;">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Sign up with Google
    </button>
    <button class="social-btn" onclick="window.location.href='login.html'" style="gap:12px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      Sign up with GitHub
    </button>

    <div class="auth-divider">or sign up with email</div>

    <form id="signup-form" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-input" id="signup-name" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="signup-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="signup-password" placeholder="Min 8 characters" required minlength="8">
      </div>
      <div class="form-group">
        <label class="form-label">Choose Plan</label>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <label class="form-check" style="background:var(--surface2);padding:12px 16px;border-radius:var(--radius-md);border:1px solid var(--border);">
            <input type="radio" name="plan" value="starter" checked>
            <div>
              <div style="font-weight:600;color:var(--text);">Starter <span class="tag tag-green" style="margin-left:6px;">Free</span></div>
              <div style="font-size:12px;color:var(--dim);margin-top:2px;">2 tools, 100 generations, 7-day trial</div>
            </div>
          </label>
          <label class="form-check" style="background:var(--surface2);padding:12px 16px;border-radius:var(--radius-md);border:1px solid rgba(251,191,36,0.3);">
            <input type="radio" name="plan" value="pro">
            <div>
              <div style="font-weight:600;color:var(--text);">Pro <span class="tag tag-gold" style="margin-left:6px;" data-usd="49">$49/mo</span></div>
              <div style="font-size:12px;color:var(--dim);margin-top:2px;">All 7 tools, 5,000 generations/mo</div>
            </div>
          </label>
          <label class="form-check" style="background:var(--surface2);padding:12px 16px;border-radius:var(--radius-md);border:1px solid var(--border);">
            <input type="radio" name="plan" value="enterprise">
            <div>
              <div style="font-weight:600;color:var(--text);">Enterprise <span class="tag tag-purple" style="margin-left:6px;" data-usd="149">$149/mo</span></div>
              <div style="font-size:12px;color:var(--dim);margin-top:2px;">Unlimited, team management, white-label</div>
            </div>
          </label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-check">
          <input type="checkbox" required>
          <span>I agree to the <a href="#" class="text-gold">Terms of Service</a> and <a href="#" class="text-gold">Privacy Policy</a></span>
        </label>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
      <div id="signup-error" class="form-error" style="text-align:center;margin-top:12px;display:none;"></div>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/hope-chat.js"></script>
<script>
function handleSignup(e) {
  e.preventDefault();
  const name = document.getElementById('signup-name').value;
  const email = document.getElementById('signup-email').value;
  const password = document.getElementById('signup-password').value;
  const plan = document.querySelector('input[name="plan"]:checked').value;
  const errorEl = document.getElementById('signup-error');

  const result = Auth.signup({ name, email, password, plan });
  if (result.success) {
    showToast('Account created! Welcome to Maxhope.AI.', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 500);
  } else {
    errorEl.textContent = result.error;
    errorEl.style.display = 'block';
  }
}

if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';
</script>
</body>
</html>
