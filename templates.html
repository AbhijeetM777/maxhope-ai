  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
  #app { min-height: 100vh; }

  /* API Key Modal */
  .key-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center; padding: 20px;

  .key-modal {
    background: #111; border: 1px solid rgba(232,55,58,0.4); border-radius: 20px;
    padding: 36px 32px; max-width: 480px; width: 100%;
    box-shadow: 0 20px 60px rgba(232,55,58,0.15);
    animation: fadeIn 0.3s ease;
  }
  .key-modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; color: #fff; letter-spacing: 2px; margin-bottom: 8px; }
  .key-modal p { color: rgba(255,255,255,0.55); font-size: 0.84rem; line-height: 1.6; margin-bottom: 24px; }
  .key-input {
    width: 100%; background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
    padding: 12px 14px; color: #fff; font-size: 0.9rem;
    outline: none; font-family: 'Syne', monospace; letter-spacing: 1px;
    transition: border-color 0.2s;
  }
  .key-input:focus { border-color: #e8373a; }
  .key-btn {
    width: 100%; margin-top: 14px; padding: 13px;
    background: #e8373a; border: none; border-radius: 10px;
    color: #fff; font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 0.85rem; letter-spacing: 1.5px; cursor: pointer;
    transition: all 0.2s;

  .key-btn:hover { background: #cc2c2f; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,55,58,0.4); }

    margin-top: 12px; font-size: 0.72rem; color: rgba(255,255,255,0.35);
    text-align: center; line-height: 1.5;
  }
  .key-note a { color: rgba(232,55,58,0.7); text-decoration: none; }
  .key-note a:hover { color: #e8373a; }

  /* Navbar */
  .page-nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,0.85); backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;

  .nav-key-btn {

  .nav-back { color: rgba(255,255,255,0.5); font-size: 0.78rem; text-decoration: none; transition: color 0.2s; }

</head>

        title: "SEO Blog Post", icon: "📝",
        desc: "Rank-ready long-form content with full SEO optimization built in",
        fields: [
          { label: "Keyword / Topic", key: "topic", placeholder: "e.g. best CRM for startups" },
          { label: "Target Audience", key: "audience", placeholder: "e.g. Startup founders" },
          { label: "Word Count", key: "words", placeholder: "e.g. 1500 words" },
        ],
        prompt: (d) => `Write a complete SEO-optimized blog post on "${d.topic||"our topic"}" for ${d.audience||"our readers"}. Target: ${d.words||"1500 words"}. Include: SEO title tag (under 60 chars), meta description (under 160 chars), H1 headline, engaging introduction with hook, 5 H2 sections with subheadings, FAQ section (5 Q&As targeting featured snippets), conclusion with CTA, and 5 internal linking suggestions. Make it comprehensive, authoritative, and genuinely useful.`
      },
      {
        title: "LinkedIn Content Pack", icon: "💼",
        desc: "30-day LinkedIn calendar to build authority and generate leads",
        fields: [
          { label: "Your Niche", key: "niche", placeholder: "e.g. Cloud Architecture" },
          { label: "Target Audience", key: "audience", placeholder: "e.g. CTOs, Founders" },
          { label: "Content Goal", key: "goal", placeholder: "e.g. Get consulting clients" },
        ],
        prompt: (d) => `Create a 30-day LinkedIn content calendar for a ${d.niche||"professional"} expert targeting ${d.audience||"business leaders"} to ${d.goal||"build authority"}. Map 30 days using 10 post types (story, insight, tip, poll idea, carousel outline, case study, opinion, list, myth-bust, question). Write FULL copy for the first 10 posts. Include posting time recommendations, hashtag strategy (10 hashtags), and engagement response tips.`
      },
      {
        title: "YouTube Video Script", icon: "🎬",
        desc: "High-retention scripts structured for views and subscriber growth",
        fields: [
          { label: "Video Topic", key: "topic", placeholder: "e.g. How to migrate to AWS" },
          { label: "Channel Niche", key: "niche", placeholder: "e.g. Tech tutorials" },
          { label: "Target Length", key: "length", placeholder: "e.g. 10 minutes" },
        ],
        prompt: (d) => `Write a complete YouTube video script for "${d.topic||"our topic"}" for a ${d.niche||"educational"} channel targeting ${d.length||"8-10 minute"} runtime. Include: attention hook (first 30 seconds), pattern interrupt at 2 minutes, main content (5 clear sections with transitions), B-roll suggestions, mid-roll ad break placement, CTA section, 5 title variations for A/B testing, thumbnail concept (3 options), and video description with timestamps and 15 relevant tags.`
      },
      {
        title: "Product Description Pack", icon: "🛍️",
        desc: "Conversion-optimized copy for marketplace and e-commerce listings",
        fields: [
          { label: "Product Name", key: "product", placeholder: "e.g. Organic Turmeric Latte" },
          { label: "Key Benefits", key: "benefits", placeholder: "e.g. Anti-inflammatory, sleep" },
          { label: "Marketplace", key: "marketplace", placeholder: "e.g. Amazon, Meesho, Shopify" },
        ],
        prompt: (d) => `Create a complete product description pack for "${d.product||"our product"}" with benefits: ${d.benefits||"key advantages"} for ${d.marketplace||"online marketplace"}. Include: short description (50 words), long description (200 words), 5 benefit-focused bullet points, SEO-optimized title, backend keyword list (20 keywords), A+ content section outline, and 3 ad copy variants for Google, Meta, and ${d.marketplace||"the marketplace"}. Optimize every element for conversion.`
      }
    ]
  }
];

/* ── API KEY MODAL ───────────────────────────────────────────────────────────── */
function ApiKeyModal({ onSave }) {
  const [key, setKey] = React.useState('');
  const [err, setErr] = React.useState('');
  const save = () => {
    if (!key.startsWith('sk-ant-')) {
      setErr('Key must start with sk-ant-  —  get yours at console.anthropic.com');
      return;
    }
    localStorage.setItem('mh_anthropic_key', key.trim());
    onSave(key.trim());
  };
  return (
    <div className="key-overlay">
      <div className="key-modal">
        <h2>🔑 CONNECT AI</h2>
        <p>
          Enter your Anthropic API key to power all 7 template tools with live Claude AI generation.<br/>
          Your key is stored only in this browser — never sent to any third party.
        </p>
        <input
          className="key-input"
          type="password"
          value={key}
          onChange={e => { setKey(e.target.value); setErr(''); }}
          placeholder="sk-ant-api03-..."
          onKeyDown={e => e.key === 'Enter' && save()}
          autoFocus
        />
        {err && <p style={{color:'#e8373a', fontSize:'0.75rem', marginTop:8}}>{err}</p>}
        <button className="key-btn" onClick={save}>⚡ ACTIVATE TEMPLATES</button>
        <p className="key-note">
          Get your free key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
          &nbsp;·&nbsp; Requests routed via local server proxy &nbsp;·&nbsp; Never stored externally
        </p>
      </div>
    </div>
  );
}

/* ── MAIN APP ────────────────────────────────────────────────────────────────── */
function MaxHopeTemplates() {
  const savedKey = localStorage.getItem('mh_anthropic_key') || '';
  const [apiKey, setApiKey]         = React.useState(savedKey);
  const [showKeyModal, setShowKeyModal] = React.useState(!savedKey);
  const [activeTool, setActiveTool]     = React.useState(0);
  const [activeTemplate, setActiveTemplate] = React.useState(null);
  const [fields, setFields]         = React.useState({});
  const [loading, setLoading]       = React.useState(false);
  const [output, setOutput]         = React.useState('');
  const [copied, setCopied]         = React.useState(false);

  const tool = TOOLS[activeTool];

  const handleToolSwitch = (idx) => {
    setActiveTool(idx);
    setActiveTemplate(null);
    setOutput('');
    setFields({});
  };

  const handleSelectTemplate = (idx) => {
    if (activeTemplate === idx) { setActiveTemplate(null); setOutput(''); setFields({}); }
    else { setActiveTemplate(idx); setOutput(''); setFields({}); }
  };

  const handleGenerate = async (tmpl) => {
    setLoading(true);
    setOutput('');
    try {
      // Detect if running on localhost (with server.js) or GitHub Pages
      const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      const endpoint = isLocal ? '/api/generate' : 'https://api.anthropic.com/v1/messages';

      const resp = await fetch(endpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          ...(isLocal ? {} : { 'anthropic-version': '2023-06-01' }),
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1800,
          messages: [{ role: 'user', content: tmpl.prompt(fields) }],
        }),
      });

      if (resp.status === 401) {
        setOutput('❌  Invalid API key. Click the key icon in the nav bar to update it.');
        setLoading(false);
        return;
      }

      const data = await resp.json();
      if (data.error) {
        setOutput(`⚠️  API error: ${data.error.message || JSON.stringify(data.error)}`);
      } else {
        const text = (data.content || []).map(b => b.text || '').join('');
        setOutput(text || 'No response received.');
      }
    } catch (e) {
      setOutput('⚠️  Could not reach the API. If you are on GitHub Pages, please run the local server (node server.js) and open http://localhost:3000/templates.html');
    }
    setLoading(false);
  };

  const handleCopy = () => {
    navigator.clipboard.writeText(output);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  const activeTmpl = activeTemplate !== null ? tool.templates[activeTemplate] : null;

  const S = {
    page: { minHeight:'100vh', position:'relative' },
    // Farm BG
    farmBg: {
      position:'fixed', inset:0, zIndex:0,
      backgroundImage:"url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=1920&q=85')",
      backgroundSize:'cover', backgroundPosition:'center', backgroundAttachment:'fixed',
    },
    overlay: {
      position:'fixed', inset:0, zIndex:1,
      background:'linear-gradient(180deg,rgba(0,0,0,0.56)0%,rgba(10,20,8,0.50)40%,rgba(0,0,0,0.60)100%)',
    },
    content: { position:'relative', zIndex:2, maxWidth:880, margin:'0 auto', padding:'0 16px 60px' },
    header: { textAlign:'center', padding:'28px 0 20px' },
    headerCard: {
      display:'inline-block', background:'rgba(0,0,0,0.58)', backdropFilter:'blur(20px)',
      borderRadius:20, padding:'12px 32px', border:'1px solid rgba(255,255,255,0.18)', marginBottom:10,
    },
    h1: { margin:0, color:'#fff', fontSize:'1.7rem', fontFamily:"'Bebas Neue',sans-serif", letterSpacing:3 },
    sub: { color:'rgba(255,255,255,0.72)', margin:0, fontSize:'0.84rem', letterSpacing:1 },
    tabs: { display:'flex', overflowX:'auto', gap:8, marginBottom:20, paddingBottom:4, scrollbarWidth:'none', WebkitOverflowScrolling:'touch' },
    toolHeader: {
      background:'rgba(0,0,0,0.58)', backdropFilter:'blur(18px)',
      borderRadius:16, padding:'14px 18px', marginBottom:16,
      display:'flex', alignItems:'center', gap:14,
    },
    grid: { display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:14 },
    panel: {
      background:'rgba(5,10,5,0.78)', backdropFilter:'blur(20px)',
      borderRadius:18, padding:22, animation:'fadeIn 0.25s ease',
    },
    footer: { textAlign:'center', marginTop:32, color:'rgba(255,255,255,0.28)', fontSize:'0.7rem', letterSpacing:'1px' },
  };

  return (
    <div style={S.page}>
      {showKeyModal && <ApiKeyModal onSave={(k) => { setApiKey(k); setShowKeyModal(false); }} />}

      <div style={S.farmBg} />
      <div style={S.overlay} />

      {/* NAV */}
      <nav className="page-nav">
        <a href="index.html" className="page-nav-logo">Maxhope<span>.AI</span></a>
        <div className="page-nav-right">
          <a href="index.html" className="nav-back">← Back to Home</a>
          <button className="nav-key-btn" onClick={() => setShowKeyModal(true)}>
            <span className="nav-key-status" style={{background: apiKey ? '#50C878' : '#e8373a'}} />
            {apiKey ? 'AI CONNECTED' : 'ADD API KEY'}
          </button>
        </div>
      </nav>

      <div style={S.content}>
        {/* HEADER */}
        <div style={S.header}>
          <div style={S.headerCard}>
            <h1 style={S.h1}>MAXHOPE<span style={{color:'#e8373a'}}>.AI</span> &nbsp;TEMPLATE HUB</h1>
          </div>
          <p style={S.sub}>🌾 7 AI tools · 28 templates · Fill details → Generate with Claude instantly</p>
        </div>

        {/* TOOL TABS */}
        <div style={S.tabs}>
          {TOOLS.map((t, i) => (
            <button key={t.id} onClick={() => handleToolSwitch(i)} style={{
              flexShrink:0, cursor:'pointer',
              padding:'7px 14px', borderRadius:30,
              border: activeTool===i ? `2px solid ${t.color}` : '1.5px solid rgba(255,255,255,0.22)',
              background: activeTool===i ? 'rgba(0,0,0,0.7)' : 'rgba(0,0,0,0.38)',
              backdropFilter:'blur(14px)',
              color: activeTool===i ? '#fff' : 'rgba(255,255,255,0.6)',
              fontFamily:"'Syne',sans-serif", fontSize:'0.68rem', fontWeight:700, letterSpacing:'0.8px',
              transition:'all 0.2s', whiteSpace:'nowrap',
              boxShadow: activeTool===i ? `0 0 14px ${t.color}55` : 'none', outline:'none',
            }}>
              <span style={{color: activeTool===i ? t.color : 'inherit'}}>{t.icon}</span>{' '}
              {t.name.replace('AI ','').replace('Micro-SaaS','SaaS')}
            </button>
          ))}
        </div>

        {/* ACTIVE TOOL HEADER */}
        <div style={{...S.toolHeader, borderLeft:`4px solid ${tool.color}`, border:`1px solid ${tool.color}33`}}>
          <span style={{fontSize:'2rem'}}>{tool.icon}</span>
          <div>
            <h2 style={{color:'#fff', margin:'0 0 5px', fontSize:'1.05rem', fontFamily:"'Bebas Neue',sans-serif", letterSpacing:1}}>{tool.name}</h2>
            <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
              {tool.tags.map(tag => (
                <span key={tag} style={{
                  background:`${tool.color}20`, border:`1px solid ${tool.color}50`,
                  color:tool.color, borderRadius:10, padding:'2px 9px',
                  fontFamily:"'Syne',monospace", fontSize:'0.62rem', fontWeight:800, letterSpacing:'1.2px',
                }}>{tag}</span>
              ))}
            </div>
          </div>
          <div style={{marginLeft:'auto', color:'rgba(255,255,255,0.35)', fontFamily:"'Syne',sans-serif", fontSize:'0.7rem'}}>
            {tool.templates.length} templates
          </div>
        </div>

        {/* TEMPLATE CARDS */}
        <div style={S.grid}>
          {tool.templates.map((tmpl, idx) => (
            <div key={idx} onClick={() => handleSelectTemplate(idx)} style={{
              background: activeTemplate===idx ? 'rgba(10,10,10,0.75)' : 'rgba(10,10,10,0.52)',
              backdropFilter:'blur(16px)', borderRadius:14, padding:16, cursor:'pointer',
              border: activeTemplate===idx ? `2px solid ${tool.color}` : '1px solid rgba(255,255,255,0.13)',
              transition:'all 0.22s',
              boxShadow: activeTemplate===idx ? `0 4px 22px ${tool.color}33` : '0 2px 8px rgba(0,0,0,0.3)',
            }}>
              <div style={{fontSize:'1.6rem', marginBottom:8}}>{tmpl.icon}</div>
              <h3 style={{color:'#fff', margin:'0 0 5px', fontFamily:"'DM Sans',sans-serif", fontSize:'0.9rem', fontWeight:700, lineHeight:1.3}}>{tmpl.title}</h3>
              <p style={{color:'rgba(255,255,255,0.55)', margin:'0 0 10px', fontSize:'0.76rem', lineHeight:1.45}}>{tmpl.desc}</p>
              <div style={{color: activeTemplate===idx ? tool.color : 'rgba(255,255,255,0.4)', fontFamily:"'Syne',sans-serif", fontSize:'0.68rem', fontWeight:700, letterSpacing:'0.5px'}}>
                {activeTemplate===idx ? '▲ CLOSE' : 'USE TEMPLATE →'}
              </div>
            </div>
          ))}
        </div>

        {/* EXPANDED PANEL */}
        {activeTmpl && (
          <div style={{...S.panel, border:`1px solid ${tool.color}44`, boxShadow:`0 8px 32px ${tool.color}22`}}>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:18}}>
              <span style={{fontSize:'1.4rem'}}>{activeTmpl.icon}</span>
              <div>
                <h3 style={{color:'#fff', margin:0, fontFamily:"'Bebas Neue',sans-serif", fontSize:'1.1rem', letterSpacing:1}}>{activeTmpl.title}</h3>
                <p style={{color:'rgba(255,255,255,0.48)', margin:0, fontSize:'0.76rem'}}>{activeTmpl.desc}</p>
              </div>
            </div>

            {/* Fields */}
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:16}}>
              {activeTmpl.fields.map(f => (
                <div key={f.key}>
                  <label style={{
                    display:'block', marginBottom:5, color:'rgba(255,255,255,0.6)',
                    fontFamily:"'Syne',sans-serif", fontSize:'0.66rem', fontWeight:700, letterSpacing:'1px',
                  }}>{f.label.toUpperCase()}</label>
                  <input
                    value={fields[f.key] || ''}
                    onChange={e => setFields(p => ({...p, [f.key]: e.target.value}))}
                    placeholder={f.placeholder}
                    style={{
                      width:'100%', boxSizing:'border-box',
                      background:'rgba(255,255,255,0.08)', border:`1px solid rgba(255,255,255,0.18)`,
                      borderRadius:9, padding:'9px 11px', color:'#fff',
                      fontFamily:"'DM Sans',sans-serif", fontSize:'0.83rem', outline:'none',
                      transition:'border-color 0.2s',
                    }}
                    onFocus={e => e.target.style.borderColor = tool.color}
                    onBlur={e => e.target.style.borderColor = 'rgba(255,255,255,0.18)'}
                  />
                </div>
              ))}
            </div>

            {/* Generate button */}
            <button
              onClick={(e) => { e.stopPropagation(); if (!apiKey) { setShowKeyModal(true); return; } handleGenerate(activeTmpl); }}
              disabled={loading}
              style={{
                background: loading ? 'rgba(80,80,80,0.5)' : tool.color,
                color:'#fff', border:'none', borderRadius:11,
                padding:'11px 28px', fontFamily:"'Syne',sans-serif", fontSize:'0.82rem', fontWeight:800,
                cursor: loading ? 'not-allowed' : 'pointer', letterSpacing:'1px',
                transition:'all 0.2s', display:'flex', alignItems:'center', gap:8,
                boxShadow: loading ? 'none' : `0 4px 18px ${tool.color}55`,
              }}
            >
              {loading
                ? <><span style={{display:'inline-block', animation:'spin 1s linear infinite'}}>⏳</span> GENERATING WITH CLAUDE AI...</>
                : <>⚡ GENERATE WITH CLAUDE AI</>
              }
            </button>

            {/* Output */}
            {output && (
              <div style={{marginTop:18, animation:'fadeIn 0.3s ease'}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
                  <span style={{color:tool.color, fontFamily:"'Syne',sans-serif", fontSize:'0.7rem', fontWeight:800, letterSpacing:'1.2px'}}>
                    ✅ AI-GENERATED OUTPUT
                  </span>
                  <button onClick={handleCopy} style={{
                    background: copied ? `${tool.color}33` : 'rgba(255,255,255,0.08)',
                    border:`1px solid ${copied ? tool.color : 'rgba(255,255,255,0.18)'}`,
                    borderRadius:7, padding:'4px 12px', color:'#fff',
                    fontFamily:"'Syne',sans-serif", fontSize:'0.68rem', cursor:'pointer', fontWeight:600,
                    transition:'all 0.2s',
                  }}>
                    {copied ? '✓ COPIED!' : '📋 Copy All'}
                  </button>
                </div>
                <div style={{
                  background:'rgba(255,255,255,0.05)', borderRadius:12, padding:16,
                  border:'1px solid rgba(255,255,255,0.1)', maxHeight:440, overflowY:'auto',
                }}>
                  <pre style={{
                    color:'rgba(255,255,255,0.88)', fontFamily:"'DM Sans',sans-serif",
                    fontSize:'0.81rem', lineHeight:1.7, whiteSpace:'pre-wrap', wordBreak:'break-word', margin:0,
                  }}>{output}</pre>
                </div>
              </div>
            )}
          </div>
        )}

        <div style={S.footer}>🌾 MAXHOPE.AI — Templates powered by Claude AI &nbsp;·&nbsp; Run locally with <code style={{color:'rgba(232,55,58,0.7)'}}>node server.js</code></div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<MaxHopeTemplates />);
</script>

<script src="js/hope-chat.js"></script>
</body>
</html>
