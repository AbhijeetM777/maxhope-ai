<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Automation Builder - Maxhope.AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="dashboard-layout">
  <div id="sidebar-container"></div>
  <main class="dash-main">
    <div id="topbar-container"></div>
    <div class="dash-content">
      <div class="tool-page-header">
        <div class="tool-page-icon" style="background:var(--gold-dim);">&#9889;</div>
        <div>
          <h2>AI Automation Builder</h2>
          <p>Build workflows, chatbots & CRM automations with natural language</p>
        </div>
      </div>

      <div class="tool-layout">
        <div class="tool-panel">
          <h3>&#9881; Configure Automation</h3>
          <form onsubmit="event.preventDefault(); generateAutomation({type: document.getElementById('auto-type').value, description: document.getElementById('auto-desc').value})">
            <div class="form-group">
              <label class="form-label">Automation Type</label>
              <select class="form-select" id="auto-type">
                <option>CRM</option>
                <option>Chatbot</option>
                <option>Email Sequence</option>
                <option>Custom</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Describe Your Automation</label>
              <textarea class="form-textarea" id="auto-desc" placeholder="e.g., When a new lead fills out the contact form, create a CRM entry, score the lead, and assign to the right sales rep..." rows="5"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">Trigger Event</label>
              <input type="text" class="form-input" placeholder="e.g., New form submission, new email, webhook..." />
            </div>
            <div class="form-group">
              <label class="form-label">Integrations</label>
              <div style="display:flex;gap:6px;flex-wrap:wrap;">
                <label class="form-check" style="background:var(--surface2);padding:8px 12px;border-radius:8px;"><input type="checkbox" checked> CRM</label>
                <label class="form-check" style="background:var(--surface2);padding:8px 12px;border-radius:8px;"><input type="checkbox"> Email</label>
                <label class="form-check" style="background:var(--surface2);padding:8px 12px;border-radius:8px;"><input type="checkbox"> Slack</label>
                <label class="form-check" style="background:var(--surface2);padding:8px 12px;border-radius:8px;"><input type="checkbox"> Webhook</label>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">&#9889; Generate Workflow</button>
          </form>
        </div>

        <div class="tool-panel">
          <h3>&#128302; Generated Workflow</h3>
          <div class="tool-output" id="automation-output">
            <div class="tool-output-placeholder">
              <div class="icon">&#9889;</div>
              <div>Configure your automation and click<br>"Generate Workflow" to see results</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../js/app.js"></script>
<script src="../js/subscription.js"></script>
<script src="../js/tools.js"></script>
<script>Auth.requireAuth();</script>
</body>
</html>
