<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot Creator - Maxhope.AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="dashboard-layout">
  <div id="sidebar-container"></div>
  <main class="dash-main">
    <div id="topbar-container"></div>
    <div class="dash-content">
      <div class="tool-page-header">
        <div class="tool-page-icon" style="background:var(--green-dim);">&#129302;</div>
        <div>
          <h2>AI Chatbot Creator</h2>
          <p>Build custom AI chatbots for support, sales & lead qualification</p>
        </div>
      </div>

      <div class="tool-layout">
        <div class="tool-panel">
          <h3>&#9881; Configure Chatbot</h3>
          <form onsubmit="event.preventDefault(); generateChatbot({botName: document.getElementById('bot-name').value, personality: document.getElementById('bot-personality').value, purpose: document.getElementById('bot-purpose').value})">
            <div class="form-group">
              <label class="form-label">Bot Name</label>
              <input type="text" class="form-input" id="bot-name" placeholder="e.g., SalesBot, SupportAI" required>
            </div>
            <div class="form-group">
              <label class="form-label">Personality</label>
              <select class="form-select" id="bot-personality">
                <option>Professional</option>
                <option>Friendly</option>
                <option>Technical</option>
                <option>Casual</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Purpose</label>
              <select class="form-select" id="bot-purpose">
                <option>Support</option>
                <option>Sales</option>
                <option>Lead-Gen</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Knowledge Base</label>
              <textarea class="form-textarea" placeholder="Paste your FAQs, product info, or any knowledge the bot should have..." rows="5"></textarea>
              <div class="form-hint">The bot will use this to answer questions accurately</div>
            </div>
            <div class="form-group">
              <label class="form-label">Welcome Message</label>
              <input type="text" class="form-input" placeholder="e.g., Hi! How can I help you today?" />
            </div>
            <button type="submit" class="btn btn-primary btn-block">&#129302; Create Chatbot</button>
          </form>
        </div>

        <div class="tool-panel">
          <h3>&#128172; Live Preview</h3>
          <div class="tool-output" id="chatbot-output">
            <div class="tool-output-placeholder">
              <div class="icon">&#128172;</div>
              <div>Configure your chatbot and click<br>"Create Chatbot" to see a live preview</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../js/app.js"></script>
<script src="../js/subscription.js"></script>
<script src="../js/tools.js"></script>
<script>Auth.requireAuth();</script>
</body>
</html>
