<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro-SaaS Generator - Maxhope.AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="dashboard-layout">
  <div id="sidebar-container"></div>
  <main class="dash-main">
    <div id="topbar-container"></div>
    <div class="dash-content">
      <div class="tool-page-header">
        <div class="tool-page-icon" style="background:var(--purple-dim);">&#128200;</div>
        <div>
          <h2>Micro-SaaS Generator</h2>
          <p>Turn your idea into a full SaaS blueprint with tech stack, features & roadmap</p>
        </div>
      </div>

      <div class="tool-layout">
        <div class="tool-panel">
          <h3>&#128161; Describe Your Idea</h3>
          <form onsubmit="event.preventDefault(); generateMicroSaaS({idea: document.getElementById('saas-idea').value, market: document.getElementById('saas-market').value, model: document.getElementById('saas-model').value})">
            <div class="form-group">
              <label class="form-label">SaaS Idea</label>
              <textarea class="form-textarea" id="saas-idea" placeholder="e.g., An AI tool that analyzes resumes and generates personalized interview prep guides..." rows="4" required></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">Target Market</label>
              <select class="form-select" id="saas-market">
                <option>Small businesses</option>
                <option>Freelancers</option>
                <option>Startups</option>
                <option>Enterprise</option>
                <option>Developers</option>
                <option>Marketers</option>
                <option>Students</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Monetization Model</label>
              <select class="form-select" id="saas-model">
                <option>Subscription</option>
                <option>Freemium</option>
                <option>Pay-per-use</option>
                <option>One-time purchase</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Core Features</label>
              <div style="display:flex;flex-direction:column;gap:8px;">
                <label class="form-check"><input type="checkbox" checked> User Authentication</label>
                <label class="form-check"><input type="checkbox" checked> Payment Processing</label>
                <label class="form-check"><input type="checkbox" checked> Dashboard & Analytics</label>
                <label class="form-check"><input type="checkbox"> API Access</label>
                <label class="form-check"><input type="checkbox"> Team Collaboration</label>
                <label class="form-check"><input type="checkbox"> Webhook Integrations</label>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">&#128200; Generate Blueprint</button>
          </form>
        </div>

        <div class="tool-panel">
          <h3>&#128196; SaaS Blueprint</h3>
          <div class="tool-output" id="microsaas-output">
            <div class="tool-output-placeholder">
              <div class="icon">&#128200;</div>
              <div>Describe your SaaS idea and<br>generate a complete blueprint</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../js/app.js"></script>
<script src="../js/subscription.js"></script>
<script src="../js/tools.js"></script>
<script>Auth.requireAuth();</script>
</body>
</html>
